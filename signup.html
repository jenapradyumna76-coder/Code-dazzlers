<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | EcoSecure</title>
    <style>
      /* CSS Reset and Enterprise Palette */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #4a5568; /* slate-600 */
        --primary-hover: #2d3748; /* slate-800 */
        --bg: #f5f5f5; /* slate-100 */
        --surface: #ffffff; /* white */
        --border: #e0e0e0; /* gray-200 */
        --text-main: #1a1a1a; /* gray-900 */
        --text-body: #333333; /* gray-800 */
        --text-muted: #666666; /* gray-500 */
        --text-hint: #999999; /* gray-400 */
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      .container {
        background: var(--surface);
        border-radius: 24px;
        border: 1px solid var(--border);
        overflow: hidden;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      .header {
        padding: 40px 40px 10px;
        text-align: center;
      }

      h1 {
        font-size: 28px;
        color: var(--text-main);
        margin-bottom: 8px;
        font-weight: 700;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .form-container {
        padding: 20px 40px 40px;
      }

      .input-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--text-body);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-size: 16px; /* Prevents auto-zoom on iOS */
        transition: all 0.3s ease;
        outline: none;
        color: var(--text-main);
      }

      input:focus {
        border-color: var(--primary);
        background: #fff;
      }

      .password-wrapper {
        position: relative;
      }

      .toggle-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-hint);
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        padding: 8px;
        text-transform: uppercase;
      }

      .btn-signup {
        width: 100%;
        padding: 16px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn-signup:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .login-link {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-top: 24px;
      }

      .login-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .terms {
        font-size: 12px;
        color: var(--text-hint);
        text-align: center;
        margin-top: 20px;
        line-height: 1.6;
      }

      /* --- RESPONSIVE ADJUSTMENTS --- */
      @media (max-width: 480px) {
        body {
          padding: 0;
          align-items: center;
        }

        .container {
          border: none;
          box-shadow: none;
          border-radius: 0;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }

        .header {
          padding: 30px 24px 10px;
        }

        .form-container {
          padding: 15px 24px 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Create Account</h1>
        <p class="subtitle">
          Join EcoSecure to manage your enterprise e-waste.
        </p>
      </div>

      <div class="form-container">
        <form id="registrationForm">
          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input
              type="text"
              id="fullname"
              placeholder="John Mitchell"
              required
            />
          </div>

          <div class="input-group">
            <label for="company">Company Name</label>
            <input
              type="text"
              id="company"
              placeholder="Eco Industries Inc."
              required
            />
          </div>

          <div class="input-group">
            <label for="email">Work Email</label>
            <input
              type="email"
              id="email"
              placeholder="j.mitchell@company.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Min. 8 characters"
                required
              />
              <button
                type="button"
                class="toggle-btn"
                onclick="togglePassword('password', this)"
              >
                Show
              </button>
            </div>
          </div>

          <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Repeat password"
                required
              />
              <button
                type="button"
                class="toggle-btn"
                onclick="togglePassword('confirmPassword', this)"
              >
                Show
              </button>
            </div>
          </div>

          <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <div class="login-link">
          Already have an account? <a href="#">Login</a>
        </div>

        <div class="terms">
          By creating an account, you agree to EcoSecure's <br />
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </div>
      </div>
    </div>

    <script>
      function togglePassword(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "Hide";
        } else {
          input.type = "password";
          btn.textContent = "Show";
        }
      }

      document
        .getElementById("registrationForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const company = document.getElementById("company").value;
          const pass = document.getElementById("password").value;
          const confirmPass = document.getElementById("confirmPassword").value;

          if (pass !== confirmPass) {
            alert("Passwords do not match.");
            return;
          }

          alert(
            `Request submitted for ${company}. Check your email for verification.`
          );
        });
    </script>
  </body>
</html>
